## [1.32.0] - 2026-04-16

### Changed
- タイトルのインライン編集をダブルクリックからシングルクリックに変更
  - タイトルをクリック → インライン編集（タイトル以外をクリック → 編集モーダル）
  - ホバー時に点線下線を表示してクリック可能であることを示す
- 「編集」ボタンを削除（タイトルクリックと編集モーダルで代替）

## [1.31.0] - 2026-04-16

### Added
- j/k キーで完了タスクにフォーカスが移動した際、折りたたまれている「完了済み」セクションを自動展開するようにした

## [1.30.0] - 2026-04-16

### Changed
- \`c\` キーによる完了状態トグルに確認ダイアログを追加
  - \`Enter\` キーで確定、\`Esc\` キーまたは「キャンセル」ボタンでキャンセル可能
  - 確認中は他のショートカットを無効化

## [1.29.0] - 2026-04-16

### Added
- 検索欄フォーカス中に \`Esc\` または \`Enter\` を押すと検索欄のフォーカスを外す処理を追加
  - 検索テキストは維持したまま j/k キーによるタスクフォーカス移動に戻れるようになった

## [1.28.0] - 2026-04-16

### Added
- タスクカードに「複製」ボタンを追加
  - クリックで元のタスクの直後に「タイトル (コピー)」として複製を挿入
  - タイトル以外のすべての属性（説明・期限・優先度・ステータス・タグ）を引き継ぐ

## [1.27.0] - 2026-04-16

### Added
- タスクタイトルのインライン編集機能を追加
  - タイトルをダブルクリックするとその場でテキスト入力に切り替わる
  - \`Enter\` キーで確定、\`Esc\` キーまたはフォーカスを外すとキャンセル
  - 編集中は青い下線で編集状態を視覚的に表示

## [1.26.0] - 2026-04-16

### Added
- フィルター条件のプリセット保存・呼び出し機能を追加
  - 「☆ プリセット」ボタンで保存済みプリセット一覧を表示
  - 現在のフィルター・ソート条件を名前付きで保存
  - プリセットをクリックするとフィルター条件を即座に適用
  - 不要なプリセットはホバー時に表示される ✕ ボタンで削除可能
  - プリセットは localStorage に永続保存

## [1.25.0] - 2026-04-16

### Added
- 完了タスクをアーカイブセクションとして折りたたむ機能を追加
  - 完了タスクはリスト下部の「完了済み（N件）」セクションにまとめて表示
  - クリックで展開・折りたたみが可能
  - 展開時は半透明（opacity-70）で通常タスクと区別しやすくした

## [1.24.0] - 2026-04-16

### Added
- タスクリストにコンパクト表示モードを追加
  - 「コンパクト」ボタンで表示密度を切り替え（説明・タグ・期限を非表示）
  - コンパクト時はカード間の余白も縮小し、より多くのタスクを一覧表示できる
  - 「通常」ボタンで元の表示に戻せる

## [1.23.0] - 2026-04-16

### Added
- ヘッダーにステータス別タスク件数サマリーを追加（未着手・進行中・完了の件数をリアルタイム表示）

## [1.22.0] - 2026-04-16

### Added
- 期限日を相対表示に変更（「今日」「昨日」「明日」「N日前/後」「N週間前/後」「Nヶ月前/後」）
  - 絶対日付 (YYYY-MM-DD) も括弧内に併記して常に確認できるようにした
  - \`src/utils/date.js\` に \`formatRelativeDate\` ユーティリティを追加

## [1.21.0] - 2026-04-16

### Added
- \`c\` キーでフォーカス中タスクの完了状態をワンクリック切り替えする機能を追加（完了 ↔ 未着手）
- ショートカット一覧モーダル（\`?\`）に \`c\` キーの説明を追加

## [1.20.0] - 2026-04-16

### Added
- \`?\` キーでキーボードショートカット一覧モーダルを表示する機能を追加
  - 全般・タスク操作・フィルター操作の3セクションで全ショートカットを一覧表示
  - \`Esc\` キーまたは \`✕\` ボタン、オーバーレイクリックで閉じられる
  - 入力中・モーダル表示中は \`?\` キーを無効化

## [1.19.0] - 2026-04-16

### Added
- タイトル・説明文によるテキスト検索機能を追加
  - フィルターバーに検索欄を追加（タイトル・説明を対象に部分一致で絞り込み）
  - \`/\` キーで検索欄にフォーカスするキーボードショートカットを追加
  - 検索中はフィルターリセットボタンを表示し、ESC キーでリセット可能

## [1.18.0] - 2026-04-16

### Added
- \`f\` キーでフィルター項目にフォーカスを当てる機能を追加（ステータス→優先度→タグ→ソート→期限切れのみ→ステータスの順で循環）
- フィルターフォーカス中に \`j\`/\`k\` キーでドロップリストの選択肢を上下に切り替えられるようにした
- フィルターフォーカス中に \`Space\` キーで「期限切れのみ」チェックボックスをトグルできるようにした
- フィルターフォーカス中の \`j\`/\`k\`/\`Space\` がタスク操作と干渉しないよう制御を追加
- \`ESC\` の処理順序にフィルターフォーカス解除を先頭に追加

## [1.17.1] - 2026-04-16

### Fixed
- dキーで一括削除する際の確認ダイアログが「0件を削除しますか？」と表示される不具合を修正
  - 登録済み関数が古いクロージャを参照していた問題を ref パターンで解消

## [1.17.0] - 2026-04-16

### Added
- \`d\` キーで選択中タスクの一括削除（チェックボックスがオンのとき）または、フォーカス中タスクの削除（チェックボックスがオフでフォーカスがあるとき）ができるようにした
- いずれも確認ダイアログを表示してから削除するようにした

## [1.16.3] - 2026-04-16

### Added
- タスクにフォーカスが当たっているときにスペースキーを押すとチェックボックスのオン・オフを切り替えられるようにした

## [1.16.2] - 2026-04-16

### Fixed
- ESC キーの処理順序を「フォーカス解除 → チェックボックス解除 → フィルターリセット」に変更

## [1.16.1] - 2026-04-16

### Fixed
- j/k フォーカス移動・簡易変更後のスクロールが sticky ヘッダーの裏に隠れる問題を修正
- sticky ヘッダーの高さを動的に取得してオフセット分スクロール位置を補正するようにした

## [1.16.0] - 2026-04-16

### Added
- \`j\` キーで次のタスク、\`k\` キーで前のタスクにフォーカスを移動するキーボードショートカットを追加
- フォーカス中のタスクをブルーのリングで視覚的に強調表示し、スクロールで自動追従するようにした
- フォーカス中に \`Enter\` キーを押すと編集モーダルを開くようにした
- \`ESC\` キーの優先順位をフォーカス解除 → フィルターリセットの順に変更

## [1.15.1] - 2026-04-16

### Fixed
- ステータス・優先度・期限の簡易変更ポップオーバー表示中に ESC キーを押すと変更せずに閉じるよう修正
- ポップオーバー表示中の ESC キーが App のフィルターリセット処理と競合しないよう修正

## [1.15.0] - 2026-04-16

### Added
- タスクカードのタイトル・説明・余白など任意の箇所をクリックすると編集モーダルを開けるようにした
- カードホバー時に薄いグレー背景を表示してクリック可能であることを視覚的に示すようにした
- ステータス・優先度・期限・タグ・チェックボックス・削除ボタンは引き続きそれぞれ独立して動作するよう維持

## [1.14.0] - 2026-04-16

### Added
- タスクカードの期限テキストをクリックするとポップオーバーが表示され、日付入力で期限を設定・変更できる機能を追加
- 期限が設定されている場合は「削除」ボタンで期限を削除できる機能を追加
- 「期限なし」のタスクもクリックで期限を新規設定できるように対応

## [1.13.0] - 2026-04-16

### Added
- ステータス・優先度を簡易変更した際、タスクの表示位置が変わった場合にスムーズスクロールで移動先を追従する機能を追加
- 変更後のタスクカードを黄色でフラッシュハイライトし、移動先を視覚的に確認できるようにした

## [1.12.0] - 2026-04-16

### Added
- タスクカードの優先度バッジをクリックするとポップオーバーが表示され、モーダルを開かずに優先度を即座に変更できる機能を追加

## [1.11.0] - 2026-04-16

### Added
- タスクカードのステータスバッジをクリックするとポップオーバーが表示され、モーダルを開かずにステータスを即座に変更できる機能を追加

## [1.10.3] - 2026-04-16

### Fixed
- 期限日ソート時、同じ期限日のタスクを優先度（高→中→低）で第2ソートするよう修正

## [1.10.2] - 2026-04-16

### Fixed
- 期限切れ判定の「今日」が UTC 日付になっていたバグを修正（ローカル時刻ベースに変更）

## [1.10.1] - 2026-04-16

### Fixed
- \`n\` キーでモーダルを開く際、タイトル入力欄に「n」が入力されてしまうバグを修正

## [1.10.0] - 2026-04-16

### Added
- \`n\` キーでタスク追加モーダルを開くショートカットを追加（入力中・モーダル表示中は無効）

## [1.9.1] - 2026-04-16

### Fixed
- タスク追加・編集モーダル表示中に ESC キーを押すとキャンセル扱いでモーダルを閉じるよう修正

## [1.9.0] - 2026-04-16

### Added
- ESC キーでフィルターを初期状態にリセットする機能を追加（モーダル表示中は無効）

## [1.8.0] - 2026-04-16

### Added
- ヘッダーにハンバーガーメニューを追加
  - JSONインポート・JSONエクスポート・HTMLエクスポートをメニュー内に移動
  - 画面下部のインポート/エクスポートボタンを削除

## [1.7.0] - 2026-04-16

### Added
- ヘッダーとフィルターバーをスクロール時も常時表示（sticky固定）に変更

  - クリックで全フィルター・ソートを初期状態（ステータス：完了以外、期限日昇順）に一括リセット

## [1.5.0] - 2026-04-16

### Added
- タスクカードのタグバッジをクリックすると、そのタグでフィルターバーを自動切替えする機能を追加

## [1.4.1] - 2026-04-16

- 選択中に「× 解除」ボタンを追加し、明示的に選択をクリア可能に

## [1.4.0] - 2026-04-16

### Added

  - タグ選択後にモーダル内で確認画面を表示（タグ名・対象件数）

## [1.3.0] - 2026-04-15

  - タスクへのタグ追加・削除（テキスト入力 + Enter、または既存タグからサジェスト選択）

  - 複数タスクへの一括タグ追加・削除（バルクタグモーダル）

## [1.2.0] - 2026-04-15

  - 選択中の件数表示と「X 件を削除」ボタン
  - 削除前の確認ダイアログ

## [1.1.0] - 2026-04-15

### Added
- ステータスフィルターに「完了以外」を追加（未着手・進行中をまとめて絞り込み）
