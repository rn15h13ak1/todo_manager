## [1.35.1] - 2026-04-17

### Fixed
- コンパクト / 通常表示を切り替えた際、フォーカス中のタスクが画面外に隠れる不具合を修正
  - TaskCard の \`useEffect\` 依存配列に \`compact\` を追加し、表示切り替え時にもスクロール追従するよう変更

## [1.35.0] - 2026-04-17

### Added
- \`v\` キーでコンパクト / 通常表示を切り替えるキーボードショートカットを追加
  - コンパクト状態を App.jsx に引き上げ、TaskList へ props 経由で渡す構成に変更
  - ショートカット一覧（\`?\`）に \`v\` キーを追記

## [1.34.1] - 2026-04-17

### Fixed
- タスクモーダルの編集モードで Escape を押しても変更内容が残ったままになる不具合を修正
  - \`enterEditMode\` でのスナップショット取得を DOM 値（\`el.value\`）から React の \`form\` state 全体に変更し、\`discardEdit\` で確実に編集前の状態に復元されるよう修正

## [1.34.0] - 2026-04-17

### Added
- タスクモーダル（追加・編集）にナビゲーションモード / 編集モードを追加
  - モーダルを開いた直後はナビゲーションモード（コンテナにフォーカス）
  - j/k キーでフォーム項目を上下移動（タイトル・説明・期限日・優先度・ステータス・タグ・ボタン）
  - Enter キーで選択項目の編集モードに切り替え
  - 編集モードから Enter で確定（textarea は Shift+Enter）、Esc で変更破棄してナビモードへ
  - select / date フィールドは編集モード中も j/k で値を変更可能
  - タグ入力欄は Enter でタグ追加、空の状態で Enter または Shift+Enter でナビモードへ

## [1.33.0] - 2026-04-16

### Added

## [1.23.0] - 2026-04-16
