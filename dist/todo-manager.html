## [1.40.0] - 2026-04-17

### Changed
- TaskCard の3つのポップオーバー（優先度・ステータス・期限日）に共通の \`usePopover\` フックを導入
  - \`src/hooks/usePopover.js\` を新規作成
  - 3×(useState + useRef + useEffect) ≒ 36行を \`usePopover\` 3呼び出しに圧縮
  - 外側クリックで閉じる処理・blockEditRef リセットをフックに集約

## [1.39.0] - 2026-04-17

### Changed
- 選択状態（selectedIds）の管理を \`src/hooks/useSelection.js\` カスタムフックに抽出
  - TaskList が持っていた \`selectedIds\` state・登録 useEffect・関数（toggleOne / toggleAll / handleDeleteSelected）を削除
  - \`onRegisterClearSelection\` / \`onRegisterToggleOne\` / \`onRegisterDeleteSelected\` / \`onRegisterToggleAll\` props（逆流 ref パターン）をすべて廃止
  - \`onSelectionChange\` / \`selectionCount\` も廃止
  - App.jsx で \`useSelection\` を呼び、\`selection\` オブジェクト1つを TaskList に渡す構成に変更
  - \`useKeyboard\` は \`clearSelectionRef\` 等の ref ではなく、直接 \`clearSelection\` / \`toggleOne\` 等の関数を受け取るよう変更

## [1.38.0] - 2026-04-17

### Changed
- \`onStatusChange\` / \`onPriorityChange\` / \`onDueDateChange\` / \`onTitleChange\` の4つの props を \`onUpdate(id, patch)\` 1つに統合
  - App.jsx → TaskList → TaskCard の3層すべてで変更
  - TaskList の props が23個→20個、TaskCard の props が14個→11個に削減

## [1.37.0] - 2026-04-17

### Changed
- App.jsx のキーボードハンドラを \`src/hooks/useKeyboard.js\` カスタムフックに分離
  - \`moveFilterOption\` 関数と \`FILTER_COUNT\` 定数をフック内に移動
  - \`c\` キーハンドラのバグ修正（誤った第3引数を削除し \`setConfirmToggle\` を正しく呼び出すよう修正）
  - App.jsx から約170行のキーボード処理コードを削減

## [1.36.1] - 2026-04-17

### Fixed
- タスクモーダルの j/k ナビゲーションを循環するよう修正（末尾→先頭、先頭→末尾）

## [1.36.0] - 2026-04-17

### Added
- キーボードショートカットを5つ追加
