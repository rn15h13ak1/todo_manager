## [1.43.0] - 2026-04-17

## [1.42.0] - 2026-04-17

### Changed
- \`useTasks.js\` の今日日付計算（\`_now\` / 手書き3行）を \`getTodayString()\` に統一

## [1.41.0] - 2026-04-17

### Changed
- TaskCard の今日日付計算（\`_now\` / \`today\` 3行）を \`getTodayString()\` 関数に抽出し \`src/utils/date.js\` に追加
- ハイライト消去タイムアウト \`2000\` ms を \`HIGHLIGHT_DURATION_MS\` 定数として \`src/utils/constants.js\` に集約
  - App.jsx（2か所）・useKeyboard.js（1か所）が定数を参照するよう変更

## [1.40.0] - 2026-04-17

### Changed
- TaskCard の3つのポップオーバー（優先度・ステータス・期限日）に共通の \`usePopover\` フックを導入
  - \`src/hooks/usePopover.js\` を新規作成
  - 3×(useState + useRef + useEffect) ≒ 36行を \`usePopover\` 3呼び出しに圧縮
  - 外側クリックで閉じる処理・blockEditRef リセットをフックに集約

## [1.39.0] - 2026-04-17

### Changed
- 選択状態（selectedIds）の管理を \`src/hooks/useSelection.js\` カスタムフックに抽出
  - TaskList が持っていた \`selectedIds\` state・登録 useEffect・関数（toggleOne / toggleAll / handleDeleteSelected）を削除
  - \`onRegisterClearSelection\` / \`onRegisterToggleOne\` / \`onRegisterDeleteSelected\` / \`onRegisterToggleAll\` props（逆流 ref パターン）をすべて廃止
  - \`onSelectionChange\` / \`selectionCount\` も廃止
  - App.jsx で \`useSelection\` を呼び、\`selection\` オブジェクト1つを TaskList に渡す構成に変更
  - \`useKeyboard\` は \`clearSelectionRef\` 等の ref ではなく、直接 \`clearSelection\` / \`toggleOne\` 等の関数を受け取るよう変更

## [1.38.0] - 2026-04-17

### Changed
- \`onStatusChange\` / \`onPriorityChange\` / \`onDueDateChange\` / \`onTitleChange\` の4つの props を \`onUpdate(id, patch)\` 1つに統合
  - App.jsx → TaskList → TaskCard の3層すべてで変更
  - TaskList の props が23個→20個、TaskCard の props が14個→11個に削減

## [1.37.0] - 2026-04-17

### Changed
- App.jsx のキーボードハンドラを \`src/hooks/useKeyboard.js\` カスタムフックに分離
  - \`moveFilterOption\` 関数と \`FILTER_COUNT\` 定数をフック内に移動
  - \`c\` キーハンドラのバグ修正（誤った第3引数を削除し \`setConfirmToggle\` を正しく呼び出すよう修正）
  - App.jsx から約170行のキーボード処理コードを削減

## [1.36.1] - 2026-04-17

### Fixed
- タスクモーダルの j/k ナビゲーションを循環するよう修正（末尾→先頭、先頭→末尾）

## [1.36.0] - 2026-04-17

### Added
- キーボードショートカットを5つ追加
  - \`y\`: フォーカス中タスクを複製
  - \`a\`: 全タスクを選択 / 全解除トグル
  - \`g\`: 先頭タスクへジャンプ
  - \`G\`: 末尾タスクへジャンプ
  - \`1\` / \`2\` / \`3\`: フォーカス中タスクの優先度を 高 / 中 / 低 に即変更
- ショートカット一覧（\`?\`）に上記5つを追記

## [1.35.1] - 2026-04-17

### Fixed
- コンパクト / 通常表示を切り替えた際、フォーカス中のタスクが画面外に隠れる不具合を修正
  - TaskCard の \`useEffect\` 依存配列に \`compact\` を追加し、表示切り替え時にもスクロール追従するよう変更

## [1.35.0] - 2026-04-17

### Added
- \`v\` キーでコンパクト / 通常表示を切り替えるキーボードショートカットを追加
  - コンパクト状態を App.jsx に引き上げ、TaskList へ props 経由で渡す構成に変更
  - ショートカット一覧（\`?\`）に \`v\` キーを追記

## [1.34.1] - 2026-04-17

### Fixed

  - \`enterEditMode\` でのスナップショット取得を DOM 値（\`el.value\`）から React の \`form\` state 全体に変更し、\`discardEdit\` で確実に編集前の状態に復元されるよう修正

## [1.34.0] - 2026-04-17

### Added

  - タグ入力欄は Enter でタグ追加、空の状態で Enter または Shift+Enter でナビモードへ

## [1.4.0] - 2026-04-16

### Added
- 一括タグ追加・削除に確認ステップを追加
  - タグ選択後にモーダル内で確認画面を表示（タグ名・対象件数）
  - 「戻る」で選択画面に戻る、「追加する / 削除する」で実行

## [1.3.1] - 2026-04-15

### Fixed
- 日本語IME変換確定のEnterキーでタグが追加されるバグを修正（\`isComposing\` チェックを追加）

## [1.3.0] - 2026-04-15

### Added
- タグ機能
  - タスクへのタグ追加・削除（テキスト入力 + Enter、または既存タグからサジェスト選択）
  - タグごとに一定の配色（ハッシュベース）でバッジ表示
  - タグによるフィルター（フィルターバーに「タグ」セレクト追加）
  - 複数タスクへの一括タグ追加・削除（バルクタグモーダル）

## [1.2.0] - 2026-04-15

### Added
- 複数タスクの一括削除機能
  - 各タスクカードにチェックボックスを追加
  - 「全て選択」チェックボックス（indeterminate 対応）
  - 選択中の件数表示と「X 件を削除」ボタン
  - 削除前の確認ダイアログ

## [1.1.0] - 2026-04-15

### Added
- ステータスフィルターに「完了以外」を追加（未着手・進行中をまとめて絞り込み）

## [1.0.0] - 2026-04-15

### Added
- タスクの CRUD（追加・編集・削除）
- タスクデータ構造：タイトル・説明・期限日・優先度・ステータス・作成日時
- ステータスフィルター（すべて / 未着手 / 進行中 / 完了）
- 優先度フィルター（すべて / 高 / 中 / 低）
- 期限切れフィルター（今日以前の未完了タスク）
- ソート（期限日昇順・降順 / 優先度 / 作成日）
- 期限切れタスクの視覚的強調（赤ボーダー・赤テキスト）
- localStorage による自動保存・自動読み込み
- JSON インポート（.json ファイルからタスクを復元）
- JSON エクスポート（\`todo-manager_yyyymmdd_hhmmss.json\`）
- HTML エクスポート（\`todo-manager_yyyymmdd_hhmmss.html\`）
- 削除時の確認ダイアログ（タスク名入り）
- 編集・削除ボタンの間隔調整（誤クリック防止）
- ヘッダーへのバージョン表示
- Vite + vite-plugin-singlefile による単一 HTML ファイルビルド
